<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#22d35a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d35a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle (petri dish) -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#2a2a4a" stroke-width="12"/>
  <!-- Inner glow -->
  <circle cx="256" cy="240" r="180" fill="url(#glow)"/>
  <!-- Floating "organisms" - colored dots representing BFF instructions -->
  <!-- Green (+) -->
  <circle cx="180" cy="200" r="24" fill="#22d35a" opacity="0.9"/>
  <circle cx="310" cy="310" r="14" fill="#22d35a" opacity="0.6"/>
  <!-- Red (-) -->
  <circle cx="320" cy="180" r="20" fill="#e63946" opacity="0.85"/>
  <circle cx="200" cy="340" r="10" fill="#e63946" opacity="0.5"/>
  <!-- Blue ([) -->
  <circle cx="240" cy="280" r="18" fill="#4361ee" opacity="0.8"/>
  <!-- Cyan (<) -->
  <circle cx="160" cy="300" r="12" fill="#00d4ff" opacity="0.7"/>
  <!-- Yellow (.) -->
  <circle cx="300" cy="240" r="16" fill="#ffd60a" opacity="0.75"/>
  <!-- Magenta (,) -->
  <circle cx="220" cy="180" r="10" fill="#ff006e" opacity="0.65"/>
  <!-- Orange (>) -->
  <circle cx="350" cy="260" r="13" fill="#ff8c00" opacity="0.7"/>
  <!-- Teal ({) -->
  <circle cx="270" cy="330" r="11" fill="#14b8a6" opacity="0.6"/>
  <!-- Connection lines suggesting interaction -->
  <line x1="180" y1="200" x2="220" y2="180" stroke="#22d35a" stroke-width="2" opacity="0.3"/>
  <line x1="240" y1="280" x2="300" y2="240" stroke="#4361ee" stroke-width="2" opacity="0.25"/>
  <line x1="320" y1="180" x2="300" y2="240" stroke="#e63946" stroke-width="1.5" opacity="0.2"/>
  <line x1="160" y1="300" x2="200" y2="340" stroke="#00d4ff" stroke-width="1.5" opacity="0.2"/>
</svg>
